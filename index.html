  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>AI Adoption @ National Life Group<\u002Ftitle>\n<style>\n  /* Altimetrik brand webfonts */\n  @font-face{font-family:'Selecta';src:url(\"55da5fcb-0a6d-4c08-8261-f61b0147edbd\") format('truetype');font-weight:400;font-style:normal;font-display:swap}\n  @font-face{font-family:'Selecta';src:url(\"ff914edb-ef3c-4249-8df7-efbbe1d5dc76\") format('truetype');font-weight:400;font-style:italic;font-display:swap}\n  @font-face{font-family:'Selecta';src:url(\"55da5fcb-0a6d-4c08-8261-f61b0147edbd\") format('truetype');font-weight:500;font-style:normal;font-display:swap}\n  @font-face{font-family:'Selecta';src:url(\"4a20893e-504c-4c63-85da-12fc2132456e\") format('truetype');font-weight:600;font-style:normal;font-display:swap}\n  @font-face{font-family:'Selecta';src:url(\"4a20893e-504c-4c63-85da-12fc2132456e\") format('truetype');font-weight:700;font-style:normal;font-display:swap}\n  @font-face{font-family:'Selecta';src:url(\"e117a8ff-6446-4846-a85e-f060d728a3b5\") format('truetype');font-weight:700;font-style:italic;font-display:swap}\n  @font-face{font-family:'Rhymes Display';src:url(\"9241658c-2bbd-4525-b743-54dc2d914784\") format('truetype');font-weight:400;font-style:normal;font-display:swap}\n  @font-face{font-family:'Rhymes Display';src:url(\"db3ebc5b-00b5-4fe3-9b57-d0bc89ddf269\") format('truetype');font-weight:500;font-style:normal;font-display:swap}\n  @font-face{font-family:'Rhymes Text';src:url(\"5fd20559-bc5f-4f05-8432-518faaba3830\") format('truetype');font-weight:400;font-style:normal;font-display:swap}\n  @font-face{font-family:'Rhymes Text';src:url(\"79ec5c94-1387-468b-8933-a3e12d394bce\") format('truetype');font-weight:400;font-style:italic;font-display:swap}\n\n  :root{\n    --bg:#ffffff; --text:#0d0d0d; --muted:#6e6e6e; --faint:#8e8e8e;\n    --line:#e5e5e5; --line-2:#ededed; --bubble:#f4f4f4; --surface:#f7f7f7;\n    --ink:#111111; --track:#e9e9e9; --hatch:#c9c9c9;\n    --thread:768px;\n    --accent:#FF6C1B;\n    --head-font:'Selecta', ui-sans-serif, -apple-system, BlinkMacSystemFont, sans-serif;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html{scroll-behavior:smooth}\n  body{font-family:'Selecta',ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;\n    color:var(--text);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;\n    font-size:16px;}\n\n  /* Top bar (chat title, not a breadcrumb) */\n  .topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.9);\n    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);\n    display:flex;align-items:center;justify-content:center;gap:8px;\n    padding:12px 16px;font-size:15px;font-weight:600}\n  .topbar .caret{color:var(--faint);font-size:12px;font-weight:400}\n\n  .thread{max-width:var(--thread);margin:0 auto;padding:28px 20px 160px}\n\n  /* Turns */\n  .turn{margin-bottom:30px}\n  .turn-user{display:flex;justify-content:flex-end}\n  .bubble{background:var(--bubble);border-radius:22px;padding:11px 18px;max-width:80%;\n    font-size:16px;color:var(--text)}\n  .turn-ai{display:flex;gap:14px}\n  .avatar{display:none}\n  .avatar svg{width:15px;height:15px}\n  .ai{flex:1;min-width:0}\n  .ai p{margin:0 0 12px}\n  .ai p:last-child{margin-bottom:0}\n  .verdict{font-weight:700;color:var(--accent)}\n  .muted{color:var(--muted)}\n\n  /* action row under AI msgs */\n  .actions{display:flex;gap:14px;margin-top:12px;color:var(--faint)}\n  .actions svg{width:16px;height:16px;cursor:default}\n  .actions svg:hover{color:var(--text)}\n\n  /* Intro stat chips */\n  .chips{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 4px}\n  .chip{border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:118px}\n  .chip .num{font-size:26px;font-weight:750;letter-spacing:-.5px;font-variant-numeric:tabular-nums}\n  .chip .lbl{font-size:12.5px;color:var(--muted);margin-top:1px}\n  .quote-flow{display:inline-flex;align-items:center;gap:12px;flex-wrap:wrap;\n    border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:14px;margin-top:14px}\n  .quote-flow .from{color:var(--muted);font-style:italic}\n  .quote-flow .arrow{font-weight:700}\n  .quote-flow .to{font-weight:700}\n\n  /* Welcome hero (ChatGPT-style landing) */\n  .welcome{display:block;text-align:center;padding:52px 0 12px;margin-bottom:34px}\n  .welcome .welcome-mark{width:56px;height:56px;margin:0 auto 24px}\n  .welcome .welcome-mark svg{width:27px;height:27px}\n  .welcome h1{font-size:30px;font-weight:600;letter-spacing:-.4px;line-height:1.22;\n    max-width:640px;margin:0 auto;color:var(--text);font-family:var(--head-font)}\n  .welcome .sub{font-size:16px;color:var(--muted);max-width:600px;margin:16px auto 0;line-height:1.55}\n  .welcome .sub b{color:var(--text);font-weight:700}\n  .welcome .chips{justify-content:center;margin:30px auto 0;max-width:640px}\n  .welcome .chip{text-align:left}\n  .welcome .quote-flow{margin:20px auto 0}\n\n  /* KPI grid */\n  .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0 4px}\n  .kpi-grid.kpi-3{grid-template-columns:repeat(3,1fr);gap:10px}\n  .kpi-grid.kpi-2{grid-template-columns:repeat(2,1fr);gap:10px}\n  .kpi-grid.kpi-4{grid-template-columns:repeat(4,1fr);gap:10px}\n  .kpi-grid.kpi-1{grid-template-columns:1fr;gap:10px}\n  .kpi-3 .kpi,.kpi-2 .kpi,.kpi-4 .kpi,.kpi-1 .kpi{padding:12px 14px}\n  .kpi-3 .k-lbl,.kpi-2 .k-lbl,.kpi-4 .k-lbl,.kpi-1 .k-lbl{min-height:0;font-size:12.5px}\n  .kpi-3 .k-num,.kpi-2 .k-num,.kpi-1 .k-num{font-size:54px;font-weight:600;line-height:.95}\n  .kpi-4 .k-num{font-size:44px;font-weight:600;line-height:.95}\n  .kpi-4 .k-lbl{min-height:54px}\n  .convo .kpi .k-lbl{color:var(--accent);text-transform:capitalize}\n  .convo .kpi{position:relative}\n  .convo .kpi .delta{position:absolute;top:12px;right:12px;margin-top:0;background:var(--accent);\n    color:#fff;border-color:var(--accent);font-size:12px;padding:3px 9px;box-shadow:0 3px 10px rgba(255,108,27,.28)}\n  .convo .kpi .delta.down{background:var(--surface);color:var(--muted);border-color:var(--line);box-shadow:none}\n  .kpi-4 .k-lbl{padding-right:54px}\n  .delta.down{border-color:var(--faint);color:var(--muted)}\n  .pct{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;\n    font-weight:inherit;font-variant-numeric:normal}\n  .ev-head{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;\n    color:var(--faint);margin:18px 0 10px}\n  .ev-note{font-size:14px;color:var(--muted);margin:16px 0 10px}\n  /* Use-case split bar (Q5) */\n  .ucbar{margin:2px 0 4px}\n  .ucbar-track{display:flex;height:40px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}\n  .ucseg{display:flex;align-items:center;gap:7px;padding:0 15px;font-family:'Rhymes Display',Georgia,serif;\n    font-weight:600;font-size:19px;line-height:1;white-space:nowrap;width:0;transition:width 1s cubic-bezier(.22,.7,.25,1)}\n  .ucseg small{font-family:'Selecta',sans-serif;font-size:11px;font-weight:600;opacity:.85}\n  .ucseg.now{background:#efeee9;color:#4b463f}\n  .ucseg.future{background:var(--accent);color:#fff;box-shadow:0 0 18px rgba(255,108,27,.55)}\n  .uclegend{display:flex;gap:18px;margin-top:9px;font-size:12px;color:var(--muted)}\n  .uclegend span{display:inline-flex;align-items:center;gap:7px}\n  .uclegend i{width:11px;height:11px;border-radius:3px;flex:none}\n  .uclegend i.now{background:#efeee9;border:1px solid var(--line)}\n  .uclegend i.future{background:var(--accent)}\n  .timeline.numbered .tl-step{padding-left:40px;padding-bottom:18px}\n  .timeline.numbered .tl-dot{width:26px;height:26px;border-radius:50%;background:var(--ink);color:#fff;\n    display:grid;place-items:center;font-size:12.5px;font-weight:700;left:0;top:0;box-shadow:none}\n  .timeline.numbered .tl-step::before{left:12px;top:30px}\n  .timeline.numbered .tl-body b{margin-bottom:0;font-size:14.5px;font-weight:400;line-height:1.45}\n  .kpi{border:1px solid var(--line);border-radius:12px;padding:12px 12px}\n  .kpi .k-lbl{font-size:11.5px;color:var(--muted);font-weight:600;min-height:0;line-height:1.3}\n  .kpi .k-num{font-size:22px;font-family:'Rhymes Display',Georgia,serif;font-weight:500;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.5px}\n  /* Hero reach metric (Q1) */\n  .hero-reach{display:flex;align-items:center;gap:18px;border:1px solid var(--line);border-radius:14px;\n    padding:20px 22px;margin:2px 0 12px}\n  .hr-ic{flex:none;width:56px;height:56px;border-radius:14px;background:rgba(255,108,27,.12);\n    display:grid;place-items:center;color:var(--accent)}\n  .hr-ic svg{width:30px;height:30px}\n  .hr-num{font-family:'Rhymes Display',Georgia,serif;font-size:52px;line-height:.9;letter-spacing:-1px;font-variant-numeric:tabular-nums}\n  .hr-lbl{font-size:14px;font-weight:700;color:var(--muted);line-height:1.2;text-align:left}\n  .hero-cap{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);\n    border-radius:10px;padding:9px 13px;font-size:14px;color:var(--muted);line-height:1.45;margin-bottom:12px}\n  .hero-cap svg{flex:none;width:15px;height:15px;color:var(--accent)}\n  .hero-cap b{color:var(--text)}\n  .kpi .k-flow{font-size:11px;color:var(--faint);margin-top:1px;font-variant-numeric:tabular-nums}\n  .delta{display:inline-block;white-space:nowrap;border:1px solid var(--text);border-radius:999px;\n    font-size:11px;font-weight:700;padding:2px 8px;margin-top:9px}\n\n  /* Dumbbell (before → after per cohort) */\n  .dumbbell{display:flex;flex-direction:column;gap:18px;margin:18px 0 6px}\n  .db-row{display:grid;grid-template-columns:150px 1fr 62px;align-items:center;gap:14px}\n  .db-lbl{font-size:13px;font-weight:600}\n  .db-lbl span{display:block;font-size:11px;color:var(--muted);font-weight:500;\n    font-variant-numeric:tabular-nums;margin-top:2px}\n  .db-track{position:relative;height:14px}\n  .db-track::before{content:\"\";position:absolute;left:0;right:0;top:50%;height:1px;\n    background:var(--line-2);transform:translateY(-50%)}\n  .db-dot{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;\n    transform:translate(-50%,-50%);z-index:2}\n  .db-dot.before{border:2px solid var(--faint);background:var(--bg)}\n  .db-line{position:absolute;top:50%;transform:translateY(-50%);height:3px;width:0;\n    background:var(--ink);border-radius:2px;transition:width 1.1s cubic-bezier(.22,1,.36,1);z-index:1}\n  .db-head{position:absolute;right:-6px;top:50%;transform:translateY(-50%);\n    width:12px;height:12px;border-radius:50%;background:var(--ink)}\n  .db-val{font-size:14px;font-weight:750;text-align:right;font-variant-numeric:tabular-nums}\n\n  /* Mindset pills */\n  .mindset{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;\n    padding:18px;border:1px solid var(--line);border-radius:14px;margin:14px 0 4px}\n  .mind-pill{padding:11px 20px;border-radius:999px;font-size:15px;font-weight:600}\n  .mind-pill.before{border:1px dashed var(--faint);color:var(--muted);font-style:italic}\n  .mind-pill.after{background:var(--ink);color:#fff}\n  .mind-arrow{font-size:22px;font-weight:800}\n\n  /* Pipeline */\n  .pipe{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;margin:14px 0 4px}\n  .stackbar{display:flex;height:44px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}\n  .seg{display:flex;align-items:center;justify-content:center;font-weight:750;font-size:13px;width:0;\n    transition:width 1.1s cubic-bezier(.22,1,.36,1)}\n  .seg.exist{background:var(--ink);color:#fff}\n  .seg.idea{color:var(--text);\n    background:repeating-linear-gradient(45deg,#e2e2e2,#e2e2e2 6px,#cfcfcf 6px,#cfcfcf 12px)}\n  .legend{display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:var(--muted);margin-top:10px}\n  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:7px;vertical-align:-2px}\n  .legend i.exist{background:var(--ink)}\n  .legend i.idea{background:repeating-linear-gradient(45deg,#e2e2e2,#e2e2e2 3px,#cfcfcf 3px,#cfcfcf 6px)}\n  .themes{display:flex;flex-direction:column;gap:8px}\n  .theme{border:1px solid var(--line);border-radius:10px;padding:11px 14px;display:flex;gap:10px;align-items:baseline}\n  .theme b{font-size:13.5px;flex:none;margin-bottom:0}\n  .theme span{font-size:12.5px;color:var(--muted);line-height:1.45}\n  /* Q4 signal cards */\n  .sigs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}\n  .sig{border:1px solid var(--line);border-radius:12px;padding:13px 15px}\n  .sig.up{border-left:1px solid var(--line)}\n  .sig.down{border-left:1px solid var(--line)}\n  .sig .top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}\n  .sig .nm{font-size:12px;font-weight:700;line-height:1.2}\n  .sig .arw{flex:none;font-size:12px;color:var(--accent)}\n  .sig.down .arw{color:var(--faint)}\n  .sig .big{font-family:'Rhymes Display',Georgia,serif;font-size:30px;font-weight:600;line-height:1}\n  .sig.up .big{color:var(--accent)}\n  .sig.down .big{color:var(--muted)}\n  .sig .mt{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.35}\n  .sigs .sig{opacity:0;transform:translateY(10px)}\n  .sigs .sig.in{opacity:1;transform:none;transition:opacity .38s ease, transform .42s cubic-bezier(.22,.7,.25,1)}\n  /* Teams-style session chat (What did your people say?) */\n  /* Teams-style session chat window */\n  .teamswin{border:1px solid var(--line);border-radius:16px;overflow:hidden;max-width:600px;margin:10px 0 4px;box-shadow:0 10px 30px rgba(0,0,0,.06)}\n  .tw-head{display:flex;align-items:center;gap:12px;padding:15px 20px;border-bottom:1px solid var(--line)}\n  .tw-mark{width:34px;height:34px;border-radius:9px;background:#5b5fc7;color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px;flex:none}\n  .tw-title{font-weight:700;font-size:17px;flex:1}\n  .tw-live{display:inline-flex;align-items:center;gap:7px;font-size:14px;color:var(--muted)}\n  .tw-live i{width:9px;height:9px;border-radius:50%;background:#e0245e}\n  .teamschat{display:flex;flex-direction:column;gap:16px;padding:20px}\n  .tmsg{display:flex;gap:12px;align-items:flex-start;opacity:0;transform:translateY(10px)}\n  .tmsg.in{opacity:1;transform:none;transition:opacity .4s ease, transform .45s cubic-bezier(.22,.7,.25,1)}\n  .tav{flex:none;width:46px;height:46px;border-radius:50%;background:#5b5fc7;color:#fff;\n    display:grid;place-items:center;font-size:14px;font-weight:700;letter-spacing:.3px}\n  .teamschat .tmsg:nth-child(1) .tav{background:#6b6fd4}\n  .teamschat .tmsg:nth-child(2) .tav{background:#c25b93}\n  .teamschat .tmsg:nth-child(3) .tav{background:#3f8a8f}\n  .teamschat .tmsg:nth-child(4) .tav{background:#4a8a5c}\n  .teamschat .tmsg:nth-child(5) .tav{background:#b9b7c9}\n  .tcol{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;align-items:flex-start}\n  .tbub{background:var(--surface);border-radius:5px 14px 14px 14px;padding:13px 18px;\n    font-size:15px;color:var(--text);line-height:1.4}\n  .trx{display:flex;gap:10px;padding-left:6px}\n  .treact{width:46px;height:46px;border-radius:50%;background:#fff;border:1px solid var(--line);\n    display:grid;place-items:center;font-size:20px;box-shadow:0 2px 6px rgba(0,0,0,.09);\n    opacity:0;transform:scale(.4)}\n  .treact.in{opacity:1;transform:none;transition:opacity .3s ease, transform .38s cubic-bezier(.34,1.55,.5,1)}\n  @media(max-width:560px){.sigs{grid-template-columns:repeat(2,1fr)}}\n\n  /* Champions */\n  .champ{display:flex;align-items:center;gap:24px;flex-wrap:wrap;margin:14px 0 4px}\n  .champ .big{font-size:56px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}\n  .champ .big small{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-top:6px}\n  .dots{display:grid;grid-template-columns:repeat(25,1fr);gap:5px;flex:1;min-width:240px}\n  .dots i{width:100%;aspect-ratio:1;border-radius:50%;background:var(--track);\n    transform:scale(0);transition:transform .3s}\n  .dots i.on{background:var(--ink)}\n\n  /* Callout (AI Champion move) */\n  .play{margin-top:14px;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;\n    padding:16px 18px;background:linear-gradient(180deg,rgba(255,108,27,.06),rgba(255,108,27,.02));\n    display:flex;gap:15px;align-items:flex-start}\n  .play-ic{flex:none;width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;\n    display:grid;place-items:center;margin-top:1px}\n  .play-ic svg{width:22px;height:22px}\n  .play-body{flex:1;min-width:0}\n  .play .kick{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;\n    color:var(--accent);margin-bottom:2px}\n  .play p{font-size:14px;color:#4b463f;line-height:1.55;margin:0}\n  .nuance{margin-top:12px;font-size:14px;color:var(--muted);border-left:3px solid var(--line);padding-left:14px}\n  .cite{font-family:'Rhymes Text',Georgia,serif;font-size:15px;color:var(--muted);font-style:italic;\n    border-left:3px solid var(--line);padding-left:14px;margin-top:12px;line-height:1.5}\n\n  /* Priorities (closing) — 90-day timeline */\n  .timeline{margin:16px 0 4px;padding-left:4px}\n  .tl-step{position:relative;padding-left:28px;padding-bottom:24px}\n  .tl-step:last-child{padding-bottom:0}\n  .tl-step::before{content:\"\";position:absolute;left:5px;top:15px;bottom:0;width:2px;background:var(--line)}\n  .tl-step:last-child::before{display:none}\n  .tl-step .tl-dot{position:absolute;left:0;top:4px;width:12px;height:12px;border-radius:50%;\n    background:var(--ink);box-shadow:0 0 0 4px var(--bg)}\n  .tl-when{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--faint);\n    margin-bottom:2px}\n  .tl-body b{font-size:15px;font-weight:400;display:block;margin-bottom:4px}\n  .tl-body span{font-size:12.5px;color:var(--muted);line-height:1.45;display:block}\n\n  /* Composer */\n  .composer{position:fixed;bottom:0;left:0;right:0;z-index:20;\n    background:linear-gradient(180deg,rgba(255,255,255,0),#fff 38%);padding:20px 20px 22px}\n  .composer-in{max-width:var(--thread);margin:0 auto}\n  .inputbar{display:flex;align-items:center;gap:10px;border:1px solid var(--line);\n    border-radius:26px;padding:12px 12px 12px 20px;box-shadow:0 2px 10px rgba(0,0,0,.05)}\n  .ci-input{flex:1;font-size:16px;color:var(--faint);text-align:left;min-width:0}\n  .ci-input.filled{color:var(--text)}\n  .send{width:34px;height:34px;border-radius:50%;background:var(--track);flex:none;\n    display:grid;place-items:center;border:none;cursor:default;transition:background .2s}\n  .send svg{width:17px;height:17px;color:var(--faint)}\n  .send.active{background:var(--accent);cursor:pointer;animation:sendpulse 1.5s ease-out infinite}\n  .send.active svg{color:#fff}\n  .disclaimer{text-align:center;font-size:11.5px;color:var(--faint);margin-top:9px}\n\n  /* App views: Home screen + Chat conversation */\n  #home{min-height:100vh;max-width:820px;margin:0 auto;padding:20px 20px 40px;\n    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative}\n  .home-foot{position:absolute;left:0;right:0;bottom:22px;text-align:center;\n    font-size:11.5px;color:var(--faint)}\n  .claim{font-family:var(--head-font);font-size:27px;font-weight:400;letter-spacing:-.4px;\n    line-height:1.24;max-width:760px;margin:0 auto;color:var(--text);text-wrap:balance}\n  .home-composer{width:100%;max-width:760px;margin:44px auto 0}\n  .hc-bar{display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--line);\n    border-radius:32px;padding:15px 15px 15px 22px;box-shadow:0 6px 24px rgba(0,0,0,.07)}\n  .hc-plus{width:26px;height:26px;flex:none;display:grid;place-items:center;color:var(--text)}\n  .hc-plus svg{width:25px;height:25px}\n  .hc-input{flex:1;text-align:left;c hover{background:#D54900}\n\n  /* Functional composer menus (+ reveal pace/print, mode = answer depth) */\n  .home-composer{position:relative}\n  .hc-plus{cursor:pointer;border-radius:50%;border:none;background:none;padding:0}\n  .hc-plus:hover{background:var(--surface)}\n  /* ChatGPT-style mode menu: header + single-line rows + right checkmark */\n  #modeMenu{border-radius:20px;padding:7px;min-width:222px}\n  .menu-head{font-size:13px;color:var(--faint);padding:9px 12px 7px;text-align:left}\n  #modeMenu button{align-items:flex-start;padding:10px 12px}\n  #modeMenu .ml{font-size:16px;font-weight:400;color:var(--text)}\n  #modeMenu .mck{width:18px;height:18px;margin-top:3px;color:var(--text)}\n  .hc-menu{position:absolute;bottom:calc(100% + 10px);z-index:30;background:var(--bg);\n    border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 40px rgba(0,0,0,.16);\n    padding:6px;min-width:256px}\n  .hc-menu[hidden]{display:none}\n  #plusMenu{left:4px}\n  #modeMenu{right:4px}\n  .hc-menu button{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;width:100%;\n    text-align:left;background:none;border:none;border-radius:10px;padding:10px 12px;font:inherit;cursor:pointer;color:var(--text)}\n  .hc-menu button:hover{background:var(--surface)}\n  .hc-menu .mtext{display:flex;flex-direction:column;gap:2px;flex:1}\n  .hc-menu b{font-size:13.5px;font-weight:600}\n  .hc-menu small{font-size:11.5px;color:var(--muted);line-height:1.35;white-space:normal}\n  .hc-menu .mck{flex:none;width:16px;height:16px;color:var(--accent);opacity:0;margin-top:2px}\n  .hc-menu button.on .mck{opacity:1}\n  .hc-menu .mdivide{height:1px;background:var(--line-2);margin:5px 8px}\n\n  /* Answer depth (mode picker) */\n  body.depth-concise .play, body.depth-concise .nuance, body.depth-concise .cite{display:none!important}\n  body.depth-standard .nuance, body.depth-standard .cite{display:none!important}\n  .hc-voice svg{width:20px;height:20px}\n  .hc-hint{font-size:12.5px;color:var(--faint);margin-top:12px}\n\n  #reveal{width:100%;opacity:0;transform:translateY(6px);transition:opacity .3s ease, transform .3s ease}\n  #reveal.show{opacity:1;transform:none}\n  .sg-guide{font-size:13px;color:var(--faint);margin:26px auto 0;text-align:center}\n  .suggests{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;width:100%;\n    max-width:760px;margin:14px auto 0}\n  .sg{display:inline-flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line);\n    border-radius:999px;padding:9px 16px;font:inherit;font-size:14px;font-weight:500;color:var(--text);\n    cursor:pointer;line-height:1.35;white-space:nowrap;max-width:100%;transition:background .15s, border-color .15s}\n  .sg:hover{background:var(--surface);border-color:var(--faint)}\n  .sg-ic{flex:none;color:var(--faint);display:grid;place-items:center}\n  .sg-ic svg{width:16px;height:16px;display:block}\n  .sg:hover .sg-ic{color:var(--accent)}\n\n  /* Chat header + convo nav */\n  .chat-top{max-width:var(--thread);margin:0 auto;padding:16px 20px 0}\n  .back{display:inline-flex;align-items:center;gap:7px;white-space:nowrap;background:var(--bg);border:1px solid var(--line);\n    border-radius:999px;padding:7px 15px 7px 11px;font:inherit;font-size:13.5px;font-weight:600;\n    color:var(--text);cursor:pointer;line-height:1}\n  .back:hover{border-color:var(--faint)}\n  .back .bi{display:inline-flex;align-items:center}\n  .back svg{width:15px;height:15px;display:block}\n  .convo{margin:0}\n  .convo-nav{display:flex;justify-content:flex-end;margin-top:28px;padding-top:20px;\n    border-top:1px solid var(--line-2)}\n  .nextq{display:inline-flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--line);\n    border-radius:14px;padding:11px 16px;font:inherit;cursor:pointer;text-align:left;color:var(--text);\n    max-width:100%;transition:border-color .15s, box-shadow .15s}\n  .nextq:hover{border-color:var(--faint);box-shadow:0 4px 14px rgba(0,0,0,.05)}\n  .nextq small{display:block;font-size:10.5px;color:var(--faint);font-weight:700;\n    text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}\n  .nextq b{font-size:14px;font-weight:600}\n  .nextq .na{color:var(--accent);flex:none;display:grid;place-items:center}\n  .nextq .na svg{width:17px;height:17px}\n\n  body.home-view .composer{display:none}\n\n  /* Guided journey: thinking, streamed reveal, follow-ups, recap */\n  .thinking{display:inline-flex;gap:5px;align-items:center;padding:6px 0}\n  .thinking span{width:7px;height:7px;border-radius:50%;background:var(--faint);\n    animation:tdot 1s ease-in-out infinite}\n  .thinking span:nth-child(2){animation-delay:.15s}\n  .thinking span:nth-child(3){animation-delay:.3s}\n  @keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}\n  .fade-in{animation:fadeUp .35s ease both}\n  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n  .followups{display:flex;flex-direction:column;gap:8px;margin:4px 0 30px 42px;animation:fadeUp .35s ease both}\n  .fchip-lbl{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--faint)}\n  .fchip{display:inline-flex;align-items:center;justify-content:space-between;gap:14px;align-self:flex-start;\n    max-width:min(100%,540px);background:var(--bg);border:1px solid var(--line);border-radius:14px;\n    padding:13px 16px;font:inherit;font-size:14.5px;font-weight:600;color:var(--text);cursor:pointer;\n    text-align:left;transition:border-color .15s, box-shadow .15s}\n  .fchip:hover{border-color:var(--faint);box-shadow:0 4px 14px rgba(0,0,0,.05)}\n  .fchip .fa{flex:none;color:var(--accent);display:grid;place-items:center}\n  .fchip .fa svg{width:17px;height:17px}\n  .recap{margin:4px 0 44px 42px;border:1px solid var(--line);border-top:3px solid var(--accent);\n    border-radius:12px;padding:20px 22px;background:var(--surface);animation:fadeUp .4s ease both;max-width:600px}\n  .recap-h{font-size:18px;font-weight:700;margin-bottom:8px}\n  .recap-arc{font-size:14px;color:var(--muted);line-height:1.55;margin-bottom:16px;text-wrap:pretty}\n  .recap-note{font-size:11.5px;color:var(--faint);line-height:1.5;margin-bottom:16px;text-wrap:pretty}\n  .recap-btn{display:inline-flex;align-items:center;gap:8px;white-space:nowrap;background:var(--ink);color:#fff;border:none;\n    border-radius:999px;padding:10px 16px 10px 14px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer}\n  .recap-btn svg{width:15px;height:15px}\n  .recap-btn:hover{background:#000}\n\n  /* Teams-style testimonial panel (closing) */\n  .tchat{margin:4px 0 30px 42px;max-width:470px;background:var(--bg);border:1px solid #d6d4d1;\n    border-radius:12px;overflow:hidden;box-shadow:0 12px 34px rgba(0,0,0,.12);animation:fadeUp .4s ease both}\n  .tchat-h{padding:14px 18px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}\n  .tchat-h .tic{width:22px;height:22px;border-radius:5px;background:#5b5fc7;display:grid;place-items:center}\n  .tchat-h .tic svg{width:14px;height:14px;color:#fff}\n  .tchat-h b{font-size:14.5px;font-weight:700}\n  .tchat-h .liven{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}\n  .tchat-h .ld{width:7px;height:7px;border-radius:50%;background:#c4314b;animation:tpulse 1.4s ease-in-out infinite}\n  @keyframes tpulse{50%{opacity:.35}}\n  .tstream{padding:16px 18px 20px;display:flex;flex-direction:column;gap:16px}\n  .tmsg{display:flex;gap:11px;opacity:0;transform:translateY(12px);\n    transition:opacity .36s ease, transform .42s cubic-bezier(.2,.8,.3,1)}\n  .tmsg.show{opacity:1;transform:none}\n  .tav{flex:none;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700}\n  .tmsg-b{flex:1;min-width:0}\n  .tmsg-txt{background:var(--surface);border-radius:4px 8px 8px 8px;padding:10px 14px;font-size:14px;\n    line-height:1.45;color:var(--text);display:inline-block;max-width:100%}\n  .trx{margin-top:-9px;margin-left:12px;display:flex;align-items:center;gap:6px;position:relative;z-index:2}\n  .treact{width:32px;height:32px;border-radius:50%;background:var(--bg);border:1px solid var(--line);\n    display:grid;place-items:center;font-size:16px;line-height:1;box-shadow:0 1px 3px rgba(0,0,0,.08);\n    opacity:0;transform:scale(.5);transition:opacity .28s ease, transform .36s cubic-bezier(.34,1.55,.5,1)}\n  .treact.show{opacity:1;transform:none}\n\n  /* Density & motion tweak states */\n  body.compact .thread{padding-top:16px}\n  body.compact .turn{margin-bottom:18px}\n  body.compact .welcome{padding:30px 0 8px;margin-bottom:22px}\n  body.no-motion *{transition:none!important;scroll-behavior:auto!important}\n\n  /* Tweaks panel */\n  .tk-fab{position:fixed;top:11px;right:16px;z-index:40;width:38px;height:38px;border-radius:50%;\n    background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;\n    box-shadow:0 2px 8px rgba(0,0,0,.06);color:var(--text)}\n  .tk-fab:hover{border-color:var(--faint)}\n  .tk-fab svg{width:18px;height:18px}\n  .tk-panel{position:fixed;top:58px;right:16px;z-index:40;width:248px;background:var(--bg);\n    border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 36px rgba(0,0,0,.14);\n    padding:16px;display:none}\n  .tk-panel.open{display:block}\n  .tk-title{font-size:11.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;\n    color:var(--faint);margin-bottom:14px}\n  .tk-group{margin-bottom:15px}\n  .tk-group:last-child{margin-bottom:0}\n  .tk-lbl{font-size:12.5px;font-weight:600;margin-bottom:7px}\n  .tk-seg{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);\n    border-radius:9px;padding:3px}\n  .tk-seg button{flex:1;border:none;background:transparent;font:inherit;font-size:12.5px;\n    font-weight:600;color:var(--muted);padding:6px 4px;border-radius:6px;cursor:pointer}\n  .tk-seg butto       <button data-pace=\"all\" type=\"button\"><span class=\"mtext\"><b>Show the whole readout<\u002Fb><small>Reveal every answer at once<\u002Fsmall><\u002Fspan><span class=\"mck\"><\u002Fspan><\u002Fbutton>\n      <div class=\"mdivide\"><\u002Fdiv>\n      <button data-act=\"print\" type=\"button\"><span class=\"mtext\"><b>Print / save as PDF<\u002Fb><small>Open the print view<\u002Fsmall><\u002Fspan><span class=\"mck\"><\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"hc-menu\" id=\"modeMenu\" hidden=\"\">\n      <div class=\"menu-head\">Answer detail<\u002Fdiv>\n      <button data-depth=\"concise\" type=\"button\"><span class=\"mtext\"><span class=\"ml\">Concise<\u002Fspan><small>Verdict and the key chart only<\u002Fsmall><\u002Fspan><span class=\"mck\"><\u002Fspan><\u002Fbutton>\n      <button data-depth=\"standard\" class=\"on\" type=\"button\"><span class=\"mtext\"><span class=\"ml\">Standard<\u002Fspan><small>Adds the recommended Champion play<\u002Fsmall><\u002Fspan><span class=\"mck\"><\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"home-foot\">AI Adoption Readout · Altimetrik × National Life Group<\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"chat\" class=\"view\" style=\"display:none\">\n  <div class=\"chat-top\">\n  <\u002Fdiv>\n  <div class=\"thread\">\n\n  <div class=\"convo\" id=\"c1\" data-q=\"What's the state of AI adoption at National Life?\">\n  <!-- Q1 -->\n  <div class=\"turn turn-user\"><div class=\"bubble\">What's the state of AI adoption at National Life?<\u002Fdiv><\u002Fdiv>\n  <div class=\"turn turn-ai\">\n    <div class=\"avatar\">SVG_SPARK<\u002Fdiv>\n    <div class=\"ai\">\n      <p><span class=\"verdict\">Momentum is real.<\u002Fspan> ChatGPT Enterprise access and 16 enablement sessions from Altimetrik's AI Practitioners have grown a wide, active base of AI users at National Life.<\u002Fp>\n      <div class=\"kpi-grid kpi-3\">\n        <div class=\"kpi\"><div class=\"k-lbl\">Employees reached<\u002Fdiv><di 002Fdiv>\n        <div class=\"kpi\"><div class=\"k-lbl\">Project messages<\u002Fdiv><div class=\"k-num\" data-count=\"9837\" data-comma=\"1\">0<\u002Fdiv><div class=\"k-flow\">5,195 → 9,837<\u002Fdiv><div class=\"delta\">+89%<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"play\"><b>Champion play:<\u002Fb><p>Adoption spreads fastest when people see real work, not demos. Encouraging early builders to show their own use cases makes AI feel practical and repeatable for teammates.<\u002Fp><\u002Fdiv>\n      <div class=\"actions\">SVG_ACTIONS<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"convo\" id=\"c3\" data-q=\"Did employees keep using ChatGPT after the sessions?\">\n  <!-- Q3 -->\n  <div class=\"turn turn-user\"><div class=\"bubble\">Did employees keep using ChatGPT after the sessions?<\u002Fdiv><\u002Fdiv>\n  <div class=\"turn turn-ai\">\n    <div class=\"avatar\">SVG_SPARK<\u002Fdiv>\n    <div class=\"ai\">\n      <p><span class=\"verdict\">Yes.<\u002Fspan> Follow-up activity remained elevated beyond the session period.<\u002Fp>\n      <div class=\"kpi-grid kpi-4\">\n        <div class=\"kpi\"><div class=\"k-lbl\">Total messages<\u002Fdiv><div class=\"k-num\" data-count=\"54190\" data-comma=\"1\">0<\u002Fdiv><div class=\"k-flow\">39,510 → 54,190<\u002Fdiv><div class=\"delta\">+37%<\u002Fdiv><\u002Fdiv>\n        <div class=\"kpi\"><div class=\"k-lbl\">Messages per WAU<\u002Fdiv><div class=\"k-num\" data-count=\"49\">0<\u002Fdiv><div class=\"k-flow\">38 → 49<\u002Fdiv><div class=\"delta\">+29%<\u002Fdiv><\u002Fdiv>\n        <div class=\"kpi\"><div class=\"k-lbl\">Project active users<\u002Fdiv><div class=\"k-num\" data-count=\"617\" data-comma=\"1\">0<\u002Fdiv><div class=\"k-flow\">313 → 617<\u002Fdiv><div class=\"delta\">+97%<\u002Fdiv><\u002Fdiv>\n        <div class=\"kpi\"><div class=\"k-lbl\">Messages per Project active user<\u002Fdiv><div class=\"k-num\" data-count=\"16\">0<\u002Fdiv><div class=\"k-flow\">17 → 16<\u002Fdiv><div class=\"delta down\">▼ 3.9%<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"play\"><b>Champion play:<\u002Fb><p>Momentum holds when AI is tied to a routine. Building lightweight, recurring habits into how teams already work can create a lasting practice.<\u002Fp><\u002Fdiv>\n      <div class=\"actions\">SVG_ACTIONS<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"convo\" id=\"c4\" data-q=\"Was AI adoption broad or limited to a few teams?\">\n  <!-- Q4 -->\n  <div class=\"turn turn-user\"><div class=\"bubble\">Was AI adoption broad or limited to a few teams?<\u002Fdiv><\u002Fdiv>\n  <div class=\"turn turn-ai\">\n    <div class=\"avatar\">SVG_SPARK<\u002Fdiv>\n    <div class=\"ai\">\n      <p><span class=\"verdict\">Broad.<\u002Fspan> Every cohort improved on at least one measure, and Projects adoption surged almost everywhere. View standouts and watchouts, by cohort, below.<\u002Fp>\n      <div class=\"sigs\">\n        <div class=\"sig up\"><div class=\"top\"><div class=\"nm\">Life New Business<\u002Fdiv><div class=\"arw\">▲<\u002Fdiv><\u002Fdiv><div class=\"big\">+520%<\u002Fdiv><div class=\"mt\">Project Active Users<\u002Fdiv><\u002Fdiv>\n        <div class=\"sig up\"><div class=\"top\"><div class=\"nm\">Underwriting<\u002Fdiv><div class=\"arw\">▲<\u002Fdiv><\u002Fdiv><div class=\"big\">+715%<\u002Fdiv><div class=\"mt\">Project Messages<\u002Fdiv><\u002Fdiv>\n        <div class=\"sig up\"><div class=\"top\"><div class=\"nm\">After Issue Services<\u002Fdiv><div class=\"arw\">▲<\u002Fdiv><\u002Fdiv><div class=\"big\">+471%<\u002Fdiv><div class=\"mt\">Project Active Users<\u002Fdiv><\u002Fdiv>\n        <div class=\"sig up\"><div class=\"top\"><div class=\"nm\">Equity Services<\u002Fdiv><div class=\"arw\">▲<\u002Fdiv><\u002Fdiv><div class=\"big\">0→15<\u002Fdiv><div class=\"mt\">Projects Created<\u002Fdiv><\u002Fdiv>\n        <div class=\"sig up\"><div class=\"top\"><div class=\"nm\">CEC<\u002Fdiv><div class=\"arw\">▲<\u002Fdiv><\u002Fdiv><div class=\"big\">+75%<\u002Fdiv><div class=\"mt\">Total Messages<\u002Fdiv><\u002Fdiv>\n        <div class=\"sig up\"><div class=\"top\"><div class=\"nm\">Annuity New Business<\u002Fdiv><div class=\"arw\">▲<\u002Fdiv><\u002Fdiv><div class=\"big\">+167%<\u002Fdiv><div class=\"mt\">GPT Active Users<\u002Fdiv><\u002Fdiv>\n        <div class=\"sig down\"><div class=\"top\"><div class=\"nm\">Information Technology<\u002Fdiv><div class=\"arw\">▼<\u002Fdiv><\u002Fdiv><div class=\"big\">−45.5%<\u002Fdiv><div class=\"mt\">GPT Active Users<\u002Fdiv><\u002Fdiv>\n        <div class=\"sig down\"><div class=\"top\"><div class=\"nm\">Sales + Retirement<\u002Fdiv><div class=\"arw\">▼<\u002Fdiv><\u002Fdiv><div class=\"big\">−32.7%<\u002Fdiv><div class=\"mt\">GPT Active Users<\u002Fdiv><\u002Fdiv>\n        <div class=\"sig down\"><div class=\"top\"><div class=\"nm\">People + Law &amp; Compliance<\u002Fdiv><div class=\"arw\">—<\u002Fdiv><\u002Fdiv><div class=\"big\">flat<\u002Fdiv><div class=\"mt\">WAU &amp; Messages<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"play\"><b>Champion play:<\u002Fb><p>Projects adoption surged almost everywhere. The consistent soft spot is Custom GPT active users in a few cohorts, a clear target for the Champion network to focus on.<\u002Fp><\u002Fdiv>\n      <div class=\"actions\">SVG_ACTIONS<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"convo\" id=\"c5\" data-q=\"What could National Life build next?\">\n  <!-- Q5 -->\n  <div class=\"turn turn-user\"><div class=\"bubble\">What could National Life build next?<\u002Fdiv><\u002Fdiv>\n  <div class=\"turn turn-ai\">\n    <div class=\"avatar\">SVG_SPARK<\u002Fdiv>\n    <div class=\"ai\">\n      <p><span class=\"verdict\">A ready-to-prioritize backlog.<\u002Fspan> 251 use-cases are documented, and Custom GPTs are a strong candidate for the next phase, subject to business-value, effort, and risk prioritization.<\u002Fp>\n      <div class=\"ucbar 02Fb> collected, which now need to be prioritized to focus effort where the value is highest. What’s next involves turning early wins into everyday practice, with deeper usage and repeatable workflows.<\u002Fp>\n      <div class=\"ev-head\" style=\"color:var(--accent)\">Where to go from here<\u002Fdiv>\n      <div class=\"timeline\">\n        <div class=\"tl-step\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-body\"><b>Activate an AI Champion network, starting with the most cautious cohorts<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-step\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-body\"><b>Rank the pipeline by business value, reach, effort, risk, and repeatability<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-step\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-body\"><b>Test a focused set of high-value workflows<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-step\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-body\"><b>Go deeper on Custom GPTs, building and sharing for repeatable workflows<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-step\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-body\"><b>Package successful Projects and GPTs as shared assets, with owners and support routes<\u002Fb><\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-step\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-body\"><b>Re-measure usage and outcomes at 1-month and 3-month intervals<\u002Fb><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"actions\">SVG_ACTIONS<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"convo\" id=\"c8\" data-q=\"So is that a wrap?\">\n  <div class=\"turn turn-user\"><div class=\"bubble\">So is that a wrap?<\u002Fdiv><\u002Fdiv>\n  <div class=\"turn turn-ai\">\n    <div class=\"avatar\">SVG_SPARK<\u002Fdiv>\n    <div class=\"ai\">\n      <p>You have the base and the pipeline, and the momentum is yours to carry. Good luck!<\u002Fp>\n      <p>We’re always here to bl\">Accent<\u002Fdiv>\n    <div class=\"tk-swatches\" data-tk=\"accent\">\n      <span class=\"tk-sw\" data-v=\"#FF6C1B\" style=\"background:#FF6C1B\" title=\"Altimetrik Orange\"><\u002Fspan>\n      <span class=\"tk-sw\" data-v=\"#377DF5\" style=\"background:#377DF5\" title=\"Blue\"><\u002Fspan>\n      <span class=\"tk-sw\" data-v=\"#55A0A5\" style=\"background:#55A0A5\" title=\"Teal\"><\u002Fspan>\n      <span class=\"tk-sw\" data-v=\"#212121\" style=\"background:#212121\" title=\"Charcoal\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tk-group\">\n    <div class=\"tk-lbl\">Density<\u002Fdiv>\n    <div class=\"tk-seg\" data-tk=\"density\"><button data-v=\"cozy\">Cozy<\u002Fbutton><button data-v=\"compact\">Compact<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tk-group\">\n    <div class=\"tk-lbl\">Motion<\u002Fdiv>\n    <div class=\"tk-seg\" data-tk=\"motion\"><button data-v=\"on\">On<\u002Fbutton><button data-v=\"off\">Off<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"tip\"><\u002Fdiv>\n\n<script>\n  // Tweaks panel — headline type, accent, density, motion (persisted)\n  (function(){\n    var D={head:'sans',accent:'#FF6C1B',density:'cozy',motion:'on'};\n    var S=Object.assign({},D);\n    try{ Object.assign(S, JSON.parse(localStorage.getItem('nlg-tweaks')||'{}')); }catch(e){}\n    function apply(){\n      var r=document.documentElement;\n      r.style.setProperty('--accent',S.accent);\n      r.style.setProperty('--head-font', S.head==='sans'\n        ? \"'Selecta', ui-sans-serif, -apple-system, sans-serif\"\n        : \"'Rhymes Display', Georgia, 'Times New Roman', serif\");\n      document.body.classList.toggle('compact', S.density==='compact');\n      document.body.classList.toggle('no-motion', S.motion==='off');\n      window.__noMotion = (S.motion==='off');\n      document.querySelectorAll('[data-tk]').forEach(function(g){\n        var val=S[g.dataset.tk];\n        g.querySelectorAll('[data-v]').forEach(function(b){ b.classList.toggle('on', b.dataset.v===val); });\n      });\n    }\n    document.querySelectorAll('[data-tk]').forEach(function(g){\n      g.addEventListener('click',function(e){\n        var b=e.target.closest('[data-v]'); if(!b) return;\n        S[g.dataset.tk]=b.dataset.v; apply();\n        try{ localStorage.setItem('nlg-tweaks',JSON.stringify(S)); }catch(e){}\n      });\n    });\n    var fab=document.getElementById('tkFab'), panel=document.getElementById('tkPanel');\n    fab.addEventListener('click',function(e){ e.stopPropagation(); panel.classList.toggle('open'); });\n    document.addEventListener('click',function(e){ if(!panel.contains(e.target)&&!fab.contains(e.target)) panel.classList.remove('open'); });\n    apply();\n  })();\n\n  // inject inline SVGs (avatar spark + action icons) to keep markup light\n  var SPARK='<svg viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M12 2l1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6L12 2z\"/><\u002Fsvg>';\n  document.querySelectorAll('.avatar').forEach(function(a){ a.innerHTML=SPARK; });\n  var ACT='<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"11\" height=\"11\" rx=\"2\"/><path d=\"M5 15V5a2 2 0 0 1 2-2h10\"/><\u002Fsvg>'+\n    '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 10v11\"/><path d=\"M18 10l-1 9a2 2 0 0 1-2 2H6V10l4-8a2 2 0 0 1 2 2v6h6a2 2 0 0 1 2 2z\"/><\u002Fsvg>'+\n    '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 14V3\"/><path d=\"M6 14l1-9a2 2 0 0 1 2-2h9v11H10l-4 8a2 2 0 0 1-2-2v-6H2a2 2 0 0 1 2-2z\" transform=\"translate(0 0)\"/><\u002Fsvg>'+\n    '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M23 4v6h-6\"/><path d=\"M20.5 14a9 9 0 1 1-2-9.5L23 10\"/><\u002Fsvg>';\n  document.querySelectorAll('.actions').forEach(function(a){\n    a.innerHTML=ACT;\n    var copyBtn=a.querySelector('svg');\n    if(copyBtn){\n      copyBtn.style.cursor='pointer';\n      copyBtn.setAttribute('title','Copy as Markdown');\n      copyBtn.addEventListener('click',function(){\n        var ai=a.closest('.ai'); if(!ai) return;\n        var md=mdFromAi(ai);\n        var fin=function(){ var orig=copyBtn.innerHTML; copyBtn.innerHTML='<path d=\"M20 6 9 17l-5-5\"/>'; copyBtn.style.color='var(--accent)'; setTimeout(function(){ copyBtn.innerHTML=orig; copyBtn.style.color=''; },1200); };\n        if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(md).then(fin,function(){ mdFallback(md); fin(); }); }\n        else { mdFallback(md); fin(); }\n      });\n    }\n  });\n  function mdFallback(t){ var ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); }\n  function mdBold(el){ var c=el.cloneNode(true); c.querySelectorAll('b,strong,.verdict').forEach(function(b){ b.textContent=' **'+b.textContent.trim()+'** '; }); return c.textContent.replace(/\\s+/g,' ').trim(); }\n  function mdFromAi(ai){\n    var convo=ai.closest('.convo'), q=convo?convo.getAttribute('data-q'):'';\n    var out=[]; if(q) out.push('## '+q);\n    Array.prototype.forEach.call(ai.children,function(el){\n      if(el.classList.contains('actions')||el.classList.contains('avatar')) return;\n      if(el.tagName==='P'){ out.push(mdBold(el)); return; }\n      if(el.classList.contains('ev-head')){ out.push('**'+el.textContent.trim()+'**'); return; }\n      if(el.classList.contains('ev-note')){ out.push(el.textContent.trim()); return; }\n      if(el.classList.contains('hero-reach')){ var num=el.querySelector('.hr-num').textContent.trim(); var lc=el.querySelector('.hr-lbl').cloneNode(true); lc.querySelectorAll('br').forEach(function(b){ b.replaceWith(' '); }); var lbl=lc.textContent.replace(/\\s+/g,' ').trim(); out.push('- **'+lbl+':** '+num); return; }\n      if(el.classList.contains('hero-cap')){ out.push(el.textContent.replace(/\\s+/g,' ').trim()); return; }\n      if(el.classList.contains('kpi-grid')){ var L=[]; el.querySelectorAll('.kpi').forEach(function(k){ var lbl=(k.querySelector('.k-lbl')||{textContent:''}).textContent.trim(); var num=(k.querySelector('.k-num')||{textContent:''}).textContent.trim(); var fl=(k.querySelector('.k-flow')||{textContent:''}).textContent.trim(); var d=(k.querySelector('.delta')||{textContent:''}).textContent.trim(); var s='- **'+lbl+':** '+num; if(fl)s+=' ('+fl+')'; if(d)s+=' \\u2014 '+d; L.push(s); }); out.push(L.join('\\n')); return; }\n      if(el.classList.contains('themes')){ var T=[]; el.querySelectorAll('.theme').forEach(function(t){ var b=(t.querySelector('b')||{textContent:''}).textContent.trim(); var sp=(t.querySelector('span')||{textContent:''}).textContent.trim(); T.push('- **'+b+'** '+sp); }); out.push(T.join('\\n')); return; }\n      if(el.classList.contains('timeline')){ var i=1, S=[]; el.querySelectorAll('.tl-body').forEach(function(b){ var when=b.querySelector('.tl-when'); var t=(b.querySelector('b')||{textContent:''}).textContent.trim(); S.push(i+'. '+(when?when.textContent.trim()+' \\u2014 ':'')+t); i++; }); out.push(S.join('\\n')); return; }\n      if(el.classList.contains('play')){ var p=el.querySelector('p'); out.push('**AI Champion move:** '+(p?p.textContent.trim():'')); return; }\n      var txt=el.textContent.replace(/\\s+/g,' ').trim(); if(txt) out.push(txt);\n    });\n    return out.join('\\n\\n');\n  }\n\n  function countUp(el){\n    var target=+el.dataset.count, comma=el.dataset.comma, pre=el.dataset.prefix||'', suf=el.dataset.suffix||'';\n    var hasPct=!!el.querySelector('.pct');\n    function write(v){ var s=pre+(comma? v.toLocaleString('en-US'):v)+(hasPct?'':suf);\n      if(el.firstChild && el.firstChild.nodeType===3){ el.firstChild.nodeValue=s; }\n      else { el.insertBefore(document.createTextNode(s), el.firstChild); } }\n    if(window.__noMotion){ write(target); return; }\n    var dur=1100, start=performance.now();\n    function step(now){ var p=Math.min((now-start)/dur,1), e=1-Math.pow(1-p,3), v=Math.round(target*e);\n      write(v); if(p<1) requestAnimationFrame(step); }\n    requestAnimationFrame(step);\n  }\n  // Render every % with a normal (diagonal) glyph, not Selecta's stacked one\n  function fixPct(root){\n    var walk=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null), nodes=[], n;\n    while(n=walk.nextNode()){ if(n.nodeValue.indexOf('%')>-1 && !(n.parentNode && n.parentNode.classList && n.parentNode.classList.contains('pct'))) nodes.push(n); }\n    nodes.forEach(function(t){ var parts=t.nodeValue.split('%'), frag=document.createDocumentFragment();\n      parts.forEach(function(p,i){ frag.appendChild(document.createTextNode(p));\n        if(i<parts.length-1){ var s=document.createElement('span'); s.className='pct'; s.textContent='%'; frag.appendChild(s); } });\n      t.parentNode.replaceChild(frag,t); });\n  }\n  fixPct(document.body);\n  var CHAMP_IC='<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"/><circle cx=\"9\" cy=\"7\" r=\"4\"/><path d=\"M22 21v-2a4 4 0 0 0-3-3.87\"/><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"/><\u002Fsvg>';\n  document.querySelectorAll('.play').forEach(function(p){\n    if(p.querySelector('.play-ic')) return;\n    var para=p.querySelector('p'), text=para?para.innerHTML:'';\n    p.innerHTML='';\n    var ic=document.createElement('div'); ic.className='play-ic'; ic.innerHTML=CHAMP_IC;\n    var body=document.createElement('div'); body.className='play-body';\n    body.innerHTML='<div class=\"kick\">AI ty=0; });\n  });\n\n  // ---- App navigation: Home screen -> individual chat conversations ----\n  (function(){\n    var IC={\n      plus:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"/><\u002Fsvg>',\n      caret:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"/><\u002Fsvg>',\n      mic:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"2\" width=\"6\" height=\"12\" rx=\"3\"/><path d=\"M5 10a7 7 0 0 0 14 0\"/><path d=\"M12 17v4\"/><\u002Fsvg>',\n      wave:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\"><path d=\"M6 9v6M10 5v14M14 8v8M18 10v4\"/><\u002Fsvg>',\n      send:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 19V5\"/><path d=\"M5 12l7-7 7 7\"/><\u002Fsvg>',\n      arrow:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"/><\u002Fsvg>',\n      back:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"/><\u002Fsvg>'\n    };\n    var q=function(s){return document.querySelector(s);};\n    if(q('.hc-plus')) q('.hc-plus').innerHTML=IC.plus;\n    if(q('.hc-model .mc')) q('.hc-model .mc').innerHTML=IC.caret;\n    if(q('.hc-voice')) q('.hc-voice').innerHTML=IC.send;\n    var SGIC={\n      c1:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M23 6l-9.5 9.5-5-5L1 18\"/><path d=\"M17 6h6v6\"/><\u002Fsvg>',\n      c2:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20V10M18 20V4M6 20v-5\"/><\u002Fsvg>',\n      c3:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"/><path d=\"M9 12l2 2 4-4\"/><\u002Fsvg>',\n      c4:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2 2 7l10 5 10-5-10-5z\"/><path d=\"M2 17l10 5 10-5\"/><path d=\"M2 12l10 5 10-5\"/><\u002Fsvg>',\n      c5:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"/><circle cx=\"9\" cy=\"7\" r=\"4\"/><path d=\"M23 21v-2a4 4 0 0 0-3-3.87\"/><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"/><\u002Fsvg>',\n      c6:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><path d=\"M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z\"/><\u002Fsvg>'\n    };\n    document.querySelectorAll('.sg').forEach(function(b){ var ic=b.querySelector('.sg-ic'); if(ic) ic.innerHTML=SGIC[b.dataset.go]||''; });\n    var bi=q('.back .bi'); if(bi) bi.innerHTML=IC.back;\n\n    var sendBtn=q('.hc-voice');\n    if(sendBtn){ sendBtn.setAttribute('role','button'); sendBtn.setAttribute('aria-label','Send'); }\n    function cueSend(){ if(sendBtn) sendBtn.classList.add('cue'); }\n\n    // Type the prompt out in black text, then cue the send button\n    var input=document.getElementById('hcInput');\n    var phrase='What\\'s the state of AI adoption at National Life?';\n    if(input){\n      if(window.__noMotion){ input.textContent=phrase; cueSend(); }\n      else{\n        input.innerHTML='<span class=\"tt\"><\u002Fspan><span class=\"type-caret\"><\u002Fspan>';\n        var tt=input.querySelector('.tt'), i=0;\n        (function step(){\n          tt.textContent=phrase.slice(0,i);\n          if(i<phrase.length){ i++; setTimeout(step, 42); }\n          else { setTimeout(function(){ var c=input.querySelector('.type-caret'); if(c) c.remove(); cueSend(); }, 450); }\n        })();\n      }\n    }\n\n    var home=document.getElementById('home'), chat=document.getElementById('chat');\n    var thread=chat.querySelector('.thread');\n    var convos=[].slice.call(document.querySelectorAll('.convo'));\n    convos.forEach(function(c){ c.style.display='none'; });\n    var motion=function(){ return !window.__noMotion; };\n\n    function scrollToConvo(c){ window.scrollTo({top:Math.max(0,c.offsetTop-64), behavior:motion()?'smooth':'auto'}); }\n    function scrollEnd(){ window.scrollTo({top:document.body.scrollHeight, behavior:motion()?'smooth':'auto'}); }\n\n    function streamP(p, done){\n      var html=p.innerHTML, text=p.textContent;\n      if(!motion() || text.trim().split(/\\s+/).length>70){ p.innerHTML=html; done&&done(); return; }\n      p.textContent=''; var i=0;\n      (function tick(){\n        if(i<text.length){\n          p.textContent=text.slice(0,i+1);\n          var ch=text.charAt(i); i++;\n          var d=16+Math.random()*16;\n          if(ch===' ') d+=12; else if('.,?!'.indexOf(ch)>-1) d+=90;\n          setTimeout(tick, d);\n        } else { p.innerHTML=html; done&&done(); }\n      })();\n    }\n\n    function typeInto(el, text, done){\n      if(!motion()){ el.textContent=text; done&&done(); return; }\n      el.textContent=''; var i=0;\n      (function tick(){\n        if(i<text.length){\n          el.textContent=text.slice(0,i+1);\n          var ch=text.charAt(i); i++;\n          var d=16+Math.random()*16;\n          if(ch===' ') d+=12; else if('.,?!'.indexOf(ch)>-1) d+=90;\n          setTimeout(tick, d);\n        } else done&&done();\n      })();\n    }\n\n    function revealAnswer(c, cb){\n      var ai=c.querySelector('.turn-ai .ai');\n      var kids=[].slice.call(ai.children);\n      kids.forEach(function(k){ k.style.display='none'; });\n      var think=document.createElement('div'); think.className='thinking';\n      think.innerHTML='<span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>';\n      ai.appendChild(think);\n      scrollEnd();\n      setTimeout(function(){\n        think.remove();\n        var first=kids[0]; if(first) first.style.display='';\n        streamP(first, function(){\n          for(var j=1;j<kids.length;j++){\n            (function(el,d){ setTimeout(function(){ el.style.display=''; el.classList.add('fade-in'); scrollEnd(); }, d); })(kids[j],(j-1)*160+120);\n          }\n          setTimeout(function(){ runViz(c.querySelector('.turn-ai')); scrollEnd(); cb&&cb(c); }, (kids.length-1)*160+380);\n        });\n      }, motion()?850:0);\n    }\n\n    function revealConvo(c, cb, typeUser){\n      c.style.display='block';\n      if(typeUser){\n        var userB=c.querySelector('.turn-user .bubble');\n        scrollToConvo(c);\n        typeInto(userB, c.getAttribute('data-q'), function(){ setTimeout(function(){ revealAnswer(c, cb); }, 360); });\n      } else {\n        scrollToConvo(c);\n        revealAnswer(c, cb);\n      }\n    }\n\n    function afterReveal(c){\n      var idx=convos.indexOf(c), next=convos[idx+1];\n      if(next){ setTimeout(function(){ queueQuestion(next); }, motion()?3000:0); }\n      else addRecap();\n    }\n    function addRecap(){ /* journey ends after the final question */ }\n    function addTestimonials(done){\n      var H='&#10084;&#65039;', T='&#128077;', HUND='&#128175;';\n      var MSGS=[\n        {txt:'Awesome! AI is game changing!! Love where NLG is going!', who:'JR', c:'#7a7fd0', rx:[HUND,H]},\n        {txt:'Super informative meeting!', who:'JM', c:'#d17a9e', rx:[T]},\n        {txt:'WOW a lot of information, thank you!', who:'TH', c:'#4aa0a5', rx:[H,T]},\n        {txt:'Lots of good info &amp; tips!', who:'ST', c:'#5aa06a', rx:[H]},\n        {txt:'This was so helpful', who:'SC', c:'#8a5fb0', rx:[HUND,H]}\n      ];\n      var TIC='<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 10v6M8 10H5.5a2 2 0 0 0 0 8H8M15 6h4a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2h-4z\"/><circle cx=\"17\" cy=\"16\" r=\"4\"/><\u002Fsvg>';\n      var panel=document.createElement('div'); panel.className='tchat';\n      var rows=MSGS.map(function(m){\n        var chips=m.rx.map(function(e){ return '<span class=\"treact\">'+e+'<\u002Fspan>'; }).join('');\n        return '<div class=\"tmsg\"><div class=\"tav\" style=\"background:'+m.c+'\">'+m.who+'<\u002Fdiv>'+\n          '<div class=\"tmsg-b\"><div class=\"tmsg-txt\">'+m.txt+'<\u002Fdiv><div class=\"trx\">'+chips+'<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n      }).join('');\n      panel.innerHTML='<div class=\"tchat-h\"><span class=\"tic\">'+TIC+'<\u002Fspan><b>Meeting chat<\u002Fb>'+\n        '<span class=\"liven\"><span class=\"ld\"><\u002Fspan>Live<\u002Fspan><\u002Fdiv><div class=\"tstream\">'+rows+'<\u002Fdiv>';\n      thread.appendChild(panel);\n      scrollEnd();\n      var msgs=panel.querySelectorAll('.tmsg');\n      if(!motion()){ msgs.forEach(function(el){ el.classList.add('show'); el.querySelectorAll('.treact').forEach(function(c){c.classList.add('show');}); }); done&&done(); return; }\n      var t=300;\n      msgs.forEach(function(el,i){\n        setTimeout(function(){\n          el.classList.add('show'); scrollEnd();\n          el.querySelectorAll('.treact').forEach(function(c,ci){ setTimeout(function(){ c.classList.add('show'); }, 440+ci*150); });\n          if(i===msgs.length-1) setTimeout(function(){ done&&done(); }, 900);\n        }, t);\n        t+=1000;\n      });\n    }\n\n    // Functional composer controls: mode = answer depth, + = reveal pace / print\n    var CHECK='<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg>';\n    document.querySelectorAll('.mck').forEach(function(m){ m.innerHTML=CHECK; });\n    var pace='guided';\n    document.body.classList.add('depth-standard');\n    var plusBtn=q('#plusBtn'), plusMenu=q('#plusMenu'), modeBtn=q('#modeBtn'), modeMenu=q('#modeMenu');\n    function closeMenus(except){ if(plusMenu&&plusMenu!==except) plusMenu.hidden=true; if(modeMenu&&modeMenu!==except) modeMenu.hidden=true; }\n    function toggleMenu(menu){ var willOpen=menu.hidden; closeMenus(menu); menu.hidden=!willOpen; }\n    if(plusBtn) plusBtn.addEventListener('click',function(e){ e.stopPropagation(); toggleMenu(plusMenu); });\n    function syncTip(){ var w=modeBtn&&modeBtn.closest('.hc-model-wrap'); if(w) w.classList.toggle('open', !modeMenu.hidden); }\n    if(modeBtn) modeBtn.addEventListener('click',function(e){ e.stopPropagation(); toggleMenu(modeMenu); syncTip(); });\n    document.addEventListener('click',function(){ closeMenus(null); syncTip(); });\n    if(plusMenu) plusMenu.addEventListener('click',function(e){\n      var b=e.target.closest('button'); if(!b) return; e.stopPropagation();\n      if(b.dataset.pace){ pace=b.dataset.pace; plusMenu.querySelectorAll('[data-pace]').forEach(function(x){ x.classList.toggle('on', x===b); }); }\n      else if(b.dataset.act==='print'){ window.print(); }\n      plusMenu.hidden=true;\n    });\n    if(modeMenu) modeMenu.addEventListener('click',function(e){\n      var b=e.target.closest('button'); if(!b) return; e.stopPropagation();\n      var d=b.dataset.depth; if(d){\n        document.body.classList.remove('depth-concise','depth-standard','depth-detailed');\n        document.body.classList.add('depth-'+d);\n        modeMenu.querySelectorAll('[data-depth]').forEach(function(x){ x.classList.toggle('on', x===b); });\n        if(modeBtn) modeBtn.firstChild.nodeValue=b.querySelector('.ml').textContent+' ';\n      }\n      modeMenu.hidden=true; syncTip();\n    });\n\n    var started=false;\n    // The next question types into the bottom chat bar; user clicks the orange send to ask it\n    var ciInput=document.getElementById('ciInput'), ciSend=document.getElementById('ciSend');\n    var CI_PLACEHOLDER = ciInput ? ciInput.textContent : '';\n    var pendingConvo=null;\n    function queueQuestion(c){\n      pendingConvo=c;\n      if(!ciInput){ submitPending(); return; }\n      ciInput.classList.add('filled');\n      typeInto(ciInput, c.getAttribute('data-q'), function(){ if(ciSend) ciSend.classList.add('active'); });\n    }\n    function submitPending(){\n      if(!pendingConvo) return;\n      var c=pendingConvo; pendingConvo=null;\n      if(ciSend) ciSend.classList.remove('active');\n      if(ciInput){ ciInput.classList.remove('filled'); ciInput.textContent=CI_PLACEHOLDER; }\n      revealConvo(c, afterReveal, false);\n    }\n    if(ciSend) ciSend.addEventListener('click', function(){ if(pendingConvo) submitPending(); });\n    function revealAll(){\n      var fb=convos[0].querySelector('.turn-user .bubble'); if(fb) fb.textContent=phrase;\n      convos.forEach(function(c){ c.style.display='block'; runViz(c.querySelector('.turn-ai')); });\n      addRecap(); window.scrollTo(0,0);\n    }\n    function startJourney(){\n      if(started) return; started=true;\n      if(sendBtn) sendBtn.classList.remove('cue');\n      closeMenus(null);\n      // the prompt the user typed becomes their first message\n      var firstBubble=convos[0].querySelector('.turn-user .bubble');\n      if(firstBubble) firstBubble.textContent=phrase;\n      home.style.display='none'; chat.style.display='block';\n      document.body.classList.remove('home-view');\n      window.scrollTo(0,0);\n      if(pace==='all') revealAll();\n      else revealConvo(convos[0], afterReveal, false);\n    }\n    if(sendBtn) sendBtn.addEventListener('click', startJourney);\n\n    var backBtn=document.getElementById('backBtn');\n    if(backBtn){ backBtn.innerHTML='<span class=\"bi\">'+IC.plus+'<\u002Fspan>New chat'; backBtn.addEventListener('click',function(){ location.reload(); }); }\n\n    document.body.classList.add('home-view');\n  })();\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
